<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话机器人</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .chat-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 80px);
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        
        .header .actions {
            display: flex;
            gap: 10px;
        }
        
        .header button {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .header button:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.assistant {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.6;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 5px;
        }
        
        .message.assistant .meta {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
            padding-left: 4px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .message.assistant .sources {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        
        .message.assistant .sources span:first-child {
            font-weight: 500;
        }
        
        .message.assistant .intent {
            background: #e8f4fd;
            color: #3b82f6;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .input-area input:focus {
            border-color: #667eea;
        }
        
        .input-area button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .input-area button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .upload-area {
            padding: 15px 20px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .upload-area label {
            background: #667eea;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .upload-area label:hover {
            background: #5a6fd6;
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .upload-area .upload-info {
            font-size: 13px;
            color: #666;
        }
        
        .upload-area .upload-info.success {
            color: #10b981;
        }
        
        .upload-area .upload-info.error {
            color: #ef4444;
        }
        
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #667eea;
            font-size: 14px;
        }
        
        .loading-dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: loading 1.4s infinite ease-in-out both;
        }
        
        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes loading {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        
        .welcome-message {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        
        .welcome-message h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #333;
        }
        
        .welcome-message p {
            font-size: 14px;
            line-height: 1.8;
        }
        
        .quick-questions {
            padding: 15px 20px;
            background: #f0fdf4;
            border-top: 1px solid #dcfce7;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .quick-question {
            background: white;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-question:hover {
            background: #bbf7d0;
            color: #15803d;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="container">
            <div class="chat-box">
                <div class="header">
                    <h1>🤖 对话机器人</h1>
                    <div class="actions">
                        <button @click="clearMessages">清空对话</button>
                        <button @click="loadSessionList">会话列表</button>
                    </div>
                </div>
                
                <div class="messages" ref="messagesContainer">
                    <div v-if="messages.length === 0" class="welcome-message">
                        <h2>欢迎使用对话机器人</h2>
                        <p>您可以上传文档（支持 txt、pdf、docx），然后向机器人提问。<br>机器人会基于您的文档内容进行智能回答。</p>
                    </div>
                    
                    <div v-for="(msg, index) in messages" :key="index" :class="['message', msg.role]">
                        <div>
                            <div class="message-content">{{ msg.content }}</div>
                            <div v-if="msg.sources && msg.sources.length > 0" class="meta">
                                <div class="sources">
                                    <span>来源:</span>
                                    <span v-for="(source, i) in msg.sources" :key="i">{{ source.split('/').pop() }}{{ i < msg.sources.length - 1 ? ', ' : '' }}</span>
                                </div>
                            </div>
                            <div v-if="msg.intent && msg.role === 'assistant'" class="meta">
                                <span class="intent">意图: {{ getIntentName(msg.intent) }}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div v-if="isLoading" class="message assistant">
                        <div class="message-content">
                            <div class="loading">
                                <span>思考中</span>
                                <div class="loading-dot"></div>
                                <div class="loading-dot"></div>
                                <div class="loading-dot"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="quick-questions">
                    <span style="color: #16a34a; font-weight: 500; margin-right: 5px;">快速提问:</span>
                    <button v-for="q in quickQuestions" :key="q" class="quick-question" @click="sendQuickQuestion(q)">{{ q }}</button>
                </div>
                
                <div class="upload-area">
                    <label for="file-upload">📁 上传文档</label>
                    <input id="file-upload" type="file" @change="handleFileUpload" accept=".txt,.pdf,.docx">
                    <span :class="['upload-info', uploadStatus]">{{ uploadMessage }}</span>
                </div>
                
                <div class="input-area">
                    <input 
                        v-model="inputMessage" 
                        @keyup.enter="sendMessage"
                        placeholder="请输入您的问题..."
                        :disabled="isLoading"
                    >
                    <button @click="sendMessage" :disabled="!inputMessage || isLoading">发送</button>
                </div>
            </div>
        </div>
        
        <div v-if="showSessionList" class="modal-overlay" @click.self="showSessionList = false">
            <div class="modal">
                <h3>会话列表</h3>
                <ul>
                    <li v-for="session in sessionList" :key="session">
                        <button @click="loadSession(session)">{{ session }}</button>
                        <button @click="deleteSession(session)" class="delete-btn">删除</button>
                    </li>
                </ul>
                <button @click="showSessionList = false" class="close-btn">关闭</button>
            </div>
        </div>
    </div>
    
    <script>
        const { createApp, ref, nextTick } = Vue;
        
        createApp({
            setup() {
                const messages = ref([]);
                const inputMessage = ref('');
                const isLoading = ref(false);
                const uploadMessage = ref('支持 txt、pdf、docx 格式');
                const uploadStatus = ref('');
                const sessionId = ref(null);
                const messagesContainer = ref(null);
                const showSessionList = ref(false);
                const sessionList = ref([]);
                
                const quickQuestions = [
                    '总结文档内容',
                    '搜索相关信息',
                    '介绍一下你自己',
                    '这个文档讲了什么'
                ];
                
                const intentNames = {
                    'question': '问题',
                    'chat': '闲聊',
                    'upload': '上传',
                    'summarize': '总结',
                    'search': '搜索',
                    'unknown': '未知',
                    'filtered': '已过滤'
                };
                
                const API_BASE = 'http://localhost:8000/api';
                
                const getIntentName = (intent) => {
                    return intentNames[intent] || intent;
                };
                
                const scrollToBottom = async () => {
                    await nextTick();
                    if (messagesContainer.value) {
                        messagesContainer.value.scrollTop = messagesContainer.value.scrollHeight;
                    }
                };
                
                const sendMessage = async () => {
                    if (!inputMessage.value.trim() || isLoading.value) return;
                    
                    const message = inputMessage.value.trim();
                    inputMessage.value = '';
                    
                    messages.value.push({ role: 'user', content: message });
                    isLoading.value = true;
                    await scrollToBottom();
                    
                    try {
                        const response = await axios.post(`${API_BASE}/chat`, {
                            user_id: 'default_user',
                            message: message,
                            session_id: sessionId.value,
                            answer_format: 'markdown'
                        });
                        
                        sessionId.value = response.data.session_id;
                        
                        messages.value.push({
                            role: 'assistant',
                            content: response.data.reply,
                            sources: response.data.sources,
                            intent: response.data.intent
                        });
                    } catch (error) {
                        messages.value.push({
                            role: 'assistant',
                            content: '抱歉，服务器出现错误，请稍后重试。'
                        });
                        console.error(error);
                    } finally {
                        isLoading.value = false;
                        await scrollToBottom();
                    }
                };
                
                const sendQuickQuestion = async (question) => {
                    inputMessage.value = question;
                    await sendMessage();
                };
                
                const handleFileUpload = async (event) => {
                    const file = event.target.files[0];
                    if (!file) return;
                    
                    uploadMessage.value = `正在上传: ${file.name}...`;
                    uploadStatus.value = '';
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    try {
                        const response = await axios.post(`${API_BASE}/documents/upload`, formData, {
                            headers: {
                                'Content-Type': 'multipart/form-data'
                            }
                        });
                        
                        uploadMessage.value = response.data.message;
                        uploadStatus.value = 'success';
                        
                        messages.value.push({
                            role: 'assistant',
                            content: `✅ ${response.data.message}`
                        });
                        await scrollToBottom();
                    } catch (error) {
                        uploadMessage.value = error.response?.data?.detail || '上传失败';
                        uploadStatus.value = 'error';
                        
                        messages.value.push({
                            role: 'assistant',
                            content: `❌ ${uploadMessage.value}`
                        });
                        await scrollToBottom();
                    }
                    
                    event.target.value = '';
                };
                
                const clearMessages = () => {
                    messages.value = [];
                    sessionId.value = null;
                    uploadMessage.value = '支持 txt、pdf、docx 格式';
                    uploadStatus.value = '';
                };
                
                const loadSessionList = async () => {
                    try {
                        const response = await axios.get(`${API_BASE}/sessions`);
                        sessionList.value = response.data.sessions;
                        showSessionList.value = true;
                    } catch (error) {
                        console.error(error);
                    }
                };
                
                const loadSession = async (session) => {
                    try {
                        const response = await axios.get(`${API_BASE}/session/${session}`);
                        messages.value = response.data.messages;
                        sessionId.value = session;
                        showSessionList.value = false;
                        await scrollToBottom();
                    } catch (error) {
                        console.error(error);
                    }
                };
                
                const deleteSession = async (session) => {
                    if (!confirm(`确定要删除会话 ${session} 吗？`)) return;
                    
                    try {
                        await axios.delete(`${API_BASE}/session/${session}`);
                        sessionList.value = sessionList.value.filter(s => s !== session);
                        if (sessionId.value === session) {
                            clearMessages();
                        }
                    } catch (error) {
                        console.error(error);
                    }
                };
                
                return {
                    messages,
                    inputMessage,
                    isLoading,
                    uploadMessage,
                    uploadStatus,
                    sessionId,
                    messagesContainer,
                    showSessionList,
                    sessionList,
                    quickQuestions,
                    getIntentName,
                    sendMessage,
                    sendQuickQuestion,
                    handleFileUpload,
                    clearMessages,
                    loadSessionList,
                    loadSession,
                    deleteSession
                };
            }
        }).mount('#app');
    </script>
    
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal {
            background: white;
            border-radius: 15px;
            padding: 25px;
            min-width: 400px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .modal h3 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .modal ul {
            list-style: none;
        }
        
        .modal li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .modal li button {
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .modal li .delete-btn {
            background: #ef4444;
        }
        
        .modal .close-btn {
            margin-top: 20px;
            width: 100%;
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</body>
</html>
